name: Publish Packages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish-web-docker:
    name: Build and publish Docker Image for Web App
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          registry-url: 'https://registry.npmjs.org'
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build:web

      - name: Set lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}-web" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          cd packages/web
          docker build \
            -t ${{ steps.image.outputs.name }}:${{ github.sha }} \
            -t ${{ steps.image.outputs.name }}:latest \
            .

      - name: Push to GitHub Container Registry
        run: |
          docker push ${{ steps.image.outputs.name }}:${{ github.sha }}
          docker push ${{ steps.image.outputs.name }}:latest

      - name: Save Docker image to tarball
        run: |
          docker save ${{ steps.image.outputs.name }}:latest | gzip > standardnotes-web.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: standardnotes-web-docker-image
          path: standardnotes-web.tar.gz
          retention-days: 30
