name: Publish Packages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-web-artifact:
    name: Build Docker Image Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build web app
        run: yarn build:web

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (local only)
        run: |
          docker build -t standardnotes-web:latest packages/web

      - name: Save image as artifact
        run: |
          docker save standardnotes-web:latest | gzip > standardnotes-web.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: standardnotes-web-image
          path: standardnotes-web.tar.gz
          retention-days: 30
