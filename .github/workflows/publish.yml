name: Publish Packages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish-web-docker:
    name: Build and publish Docker Image for Web App
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build web app
        run: yarn build:web

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: packages/web
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-web:${{ github.sha }}
            ghcr.io/${{ github.repository }}-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pull image for export
        run: |
          docker pull ghcr.io/${{ github.repository }}-web:latest

      - name: Export Docker image (Docker-compatible tar.gz)
        run: |
          docker save ghcr.io/${{ github.repository }}-web:latest | gzip > standardnotes-web.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: standardnotes-web-docker-image
          path: standardnotes-web.tar.gz
          retention-days: 30
