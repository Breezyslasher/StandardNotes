name: Mobile Release Production

on:
  push:
    tags:
      - '*standardnotes/web*'
  workflow_dispatch:

jobs:
  android:
    defaults:
      run:
        working-directory: packages/mobile
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    env:
      DETOX_CI: '1'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Java version
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - name: Export version from package.json
        run:
          echo "PACKAGE_VERSION=$(grep '"version"' ../web/package.json | cut -d '"' -f 4 | cut -d "-" -f 1)" >> $GITHUB_ENV
      - name: Setup react-native kernel and increase watchers
        run: echo fs.inotify.max_user_watches=524288 | sudo tee -a /etc/sysctl.conf && sudo sysctl -p
      - name: Install dependencies
        run: yarn install --immutable
      - run: yarn build:mobile
      - name: Bundle JS for Android
        run: yarn android:bundle
      - name: Build Android Release (debug-signed)
        working-directory: packages/mobile/android
        run: ./gradlew assembleProdRelease bundleProdRelease -PversionName="${{ env.PACKAGE_VERSION }}" -PversionCode="${{ github.run_number }}"

      - name: Generate Release Notes
        uses: ./actions/release-notes
        with:
          package: mobile
        id: release-notes
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-prod-release
          path: |
            packages/mobile/android/app/build/outputs/bundle/prodRelease/app-prod-release.aab
            packages/mobile/android/app/build/outputs/apk/prod/release/app-prod-release.apk

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: "@standardnotes/mobile@${{ env.PACKAGE_VERSION }}-${{ github.run_number }}"
          name: "Mobile ${{ env.PACKAGE_VERSION }} (build ${{ github.run_number }})"
          body: ${{ steps.release-notes.outputs.result }}
          prerelease: true
          draft: false
          files: |
            packages/mobile/android/app/build/outputs/bundle/prodRelease/app-prod-release.aab
            packages/mobile/android/app/build/outputs/apk/prod/release/app-prod-release.apk

  ios:
    defaults:
      run:
        working-directory: packages/mobile
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"
      - name: Export version from package.json
        run:
          echo "PACKAGE_VERSION=$(grep '"version"' ../web/package.json | cut -d '"' -f 4 | cut -d "-" -f 1)" >> $GITHUB_ENV
      - name: Ruby Setup for Fastlane
        uses: ruby/setup-ruby@v1
        with:
          working-directory: 'packages/mobile'
      - name: Install dependencies
        run: yarn install --immutable 
      - name: Bundle install
        run: bundle install
      - name: Install pods
        run: yarn install:pods
      - run: yarn build:mobile
      - name: Set ssh connection to Github
        uses: webfactory/ssh-agent@v0.4.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Export Apple AppStore Connect API key
        run: echo "${{ secrets.APPSTORE_CONNECT_KEY }}" > ios/Authkey.p8
      - name: Setup fastlane
        uses: maierj/fastlane-action@v1.4.0
        env:
          FASTLANE_USER: ${{ secrets.FASTLANE_USER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        with:
          lane: 'ios setup'
          subdirectory: 'packages/mobile'
      - name: fastlane
        uses: maierj/fastlane-action@v1.4.0
        env:
          APPLE_APP_ID: ${{ secrets.APP_APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPSTORE_CONNECT_KEY_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ISSUER_ID }}
          BUILD_NUMBER: ${{ github.run_number }}
          FASTLANE_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}
          FASTLANE_SESSION: ${{ secrets.FASTLANE_SESSION }}
          FASTLANE_USER: ${{ secrets.FASTLANE_USER }}
          MATCH_CERTIFICATES_URL: ${{ secrets.MATCH_CERTIFICATES_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          PACKAGE_VERSION: ${{ env.PACKAGE_VERSION }}
        with:
          lane: 'ios prod'
          subdirectory: 'packages/mobile'
